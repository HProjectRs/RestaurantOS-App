# [![CI](https://github.com/HProjectRs/RestaurantOS/actions/workflows/ci.yml/badge.svg)](https://github.com/HProjectRs/RestaurantOS/actions/workflows/ci.yml)
# [![codecov](https://codecov.io/gh/HProjectRs/RestaurantOS/branch/main/graph/badge.svg)](https://codecov.io/gh/HProjectRs/RestaurantOS)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Install client dependencies
        run: npm ci
        working-directory: client
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: server
      - name: Check Prettier formatting
        run: npx prettier --check .
        working-directory: server
        continue-on-error: true
      - name: Check Prettier formatting (client)
        run: npx prettier --check .
        working-directory: client
        continue-on-error: true
      - name: Lint server
        run: npx eslint . --ext .ts --max-warnings=0
        working-directory: server
        continue-on-error: true
      - name: Lint client
        run: npx eslint . --ext .ts,.tsx --max-warnings=0
        working-directory: client
        continue-on-error: true
      - name: TypeScript check shared
        run: npx tsc --noEmit
        working-directory: shared
        continue-on-error: true
      - name: TypeScript check server
        run: npx tsc --noEmit
        working-directory: server
      - name: TypeScript check client
        run: npx tsc --noEmit
        working-directory: client
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            server/node_modules
            client/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('server/package-lock.json', 'client/package-lock.json') }}

  test:
    name: Test
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: restaurantos_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: server
      - name: Push database schema
        run: npx prisma db push
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/restaurantos_test
      - name: Run server tests with coverage
        run: npm test -- --coverage
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/restaurantos_test
          JWT_SECRET: test-jwt-secret-for-ci
          REFRESH_SECRET: test-refresh-secret-for-ci
          JWT_EXPIRES_IN: 15m
          NODE_ENV: test
      - name: Upload server coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: server/coverage
          flags: server
          fail_ci_if_error: false

  client-test:
    name: Client Tests
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install client dependencies
        run: npm ci
        working-directory: client
      - name: Run client tests with coverage
        run: npm test -- --coverage
        working-directory: client
        env:
          VITE_SENTRY_DSN: ''
      - name: Upload client coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: client/coverage
          flags: client
          fail_ci_if_error: false

  build:
    name: Build
    needs: [lint-and-typecheck, test, client-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Build server
        run: npm run build
        working-directory: server
      - name: Install client dependencies
        run: npm ci
        working-directory: client
      - name: Build client
        run: npm run build
        working-directory: client

  e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: restaurantos_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
      - name: Install dependencies
        run: |
          npm ci
          cd server && npm ci && cd ..
          cd client && npm ci && cd ..
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: server
      - name: Push database schema
        run: npx prisma db push
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/restaurantos_test
      - name: Install Playwright browsers
        run: npx playwright install chromium
        working-directory: client
      - name: Run Playwright tests
        run: npm run test:e2e
        working-directory: client
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/restaurantos_test
          JWT_SECRET: test-jwt-secret-for-ci
          REFRESH_SECRET: test-refresh-secret-for-ci
          NODE_ENV: test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7

  load-test:
    name: Load Test (Smoke)
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: restaurantos_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: server
      - name: Push database schema
        run: npx prisma db push
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/restaurantos_test
      - name: Start server
        run: |
          npm run build && node dist/index.js &
          sleep 5
          curl -f http://localhost:3001/api/health || exit 1
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/restaurantos_test
          JWT_SECRET: test-jwt-secret-for-ci
          REFRESH_SECRET: test-refresh-secret-for-ci
          NODE_ENV: test
          PORT: 3001
      - name: Run k6 smoke test
        run: k6 run tests/load/smoke-test.js
        env:
          BASE_URL: http://localhost:3001
